<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Регистрация</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="d-flex align-items-center justify-content-center" style="height: 100vh; background-color: #f8f9fa;">

    <div class="card shadow" style="width: 400px;">
        <div class="card-body p-4">
            <h3 class="text-center mb-4">Регистрация</h3>

            <!-- Блок ошибки -->
            {% if request.query_params.get('error') %}
            <div class="alert alert-danger">
                {{ request.query_params.get('error') }}
            </div>
            {% endif %}

            <!-- Блок успеха -->
            {% if request.query_params.get('success') %}
            <div class="alert alert-success">
                Регистрация прошла успешно! Теперь вы можете <a href="/api/v1/auth/login">войти</a>.
            </div>
            {% else %}

            <form action="/api/v1/auth/register" method="post">
                <div class="mb-3">
                    <label for="email" class="form-label">Email</label>
                    <input type="email" class="form-control" id="email" name="email" required autofocus placeholder="name@example.com">
                    <div class="form-text">Будет использован как логин.</div>
                </div>

                <div class="mb-3">
                    <label for="password" class="form-label">Пароль</label>
                    <input type="password" class="form-control" id="password" name="password" required minlength="6">
                </div>

                <div class="d-grid">
                    <button type="submit" class="btn btn-success">Зарегистрироваться</button>
                </div>
            </form>

            {% endif %}

            <div class="mt-3 text-center">
                <a href="/api/v1/auth/login">Уже есть аккаунт? Войти</a>
            </div>
        </div>
    </div>

</body>
</html>
