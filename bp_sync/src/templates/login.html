<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Вход</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="d-flex align-items-center justify-content-center" style="height: 100vh; background-color: #f8f9fa;">

    <div class="card shadow" style="width: 400px;">
        <div class="card-body p-4">
            <h3 class="text-center mb-4">Вход в систему</h3>

            <!-- Блок ошибки -->
            {% if request.query_params.get('error') %}
            <div class="alert alert-danger">
                Неверный email или пароль.
            </div>
            {% endif %}

            <form action="/api/v1/auth/token" method="post">
                <div class="mb-3">
                    <label for="username" class="form-label">Email</label>
                    <!-- Поле должно называться username для OAuth2PasswordRequestForm -->
                    <input type="email" class="form-control" id="username" name="username" required autofocus placeholder="name@example.com">
                </div>

                <div class="mb-3">
                    <label for="password" class="form-label">Пароль</label>
                    <input type="password" class="form-control" id="password" name="password" required>
                </div>

                <div class="d-grid">
                    <button type="submit" class="btn btn-primary">Войти</button>
                </div>
            </form>

            <div class="mt-3 text-center">
                <small class="text-muted">Нет аккаунта?</small>
                <a href="/api/v1/auth/register">Зарегистрироваться</a>
            </div>
        </div>
    </div>

</body>
</html>
