<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Выбор источника</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-5">
    <h1>Обработка данных от поставщиков</h1>
    <div class="card p-4">
        <form action="/api/v1/suppliers/products/" method="get">
            <div class="mb-3">
                <label for="source" class="form-label">Выберите источник данных (Source):</label>
                <select class="form-select" name="source" id="source" required>
                    {% for s in sources %}
                    <option value="{{ s }}">{{ s }}</option>
                    {% endfor %}
                </select>
            </div>
            <button type="submit" class="btn btn-primary">Показать товары к проверке</button>
        </form>
    </div>
</body>
</html>
